<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics & Quantum Notes</title>

    <script id="MathJax-script" async src="./js/tex-mml-chtml.js"></script>

    <link rel="stylesheet" href="./js/css/fonts.css">
    
    <script>
        // Tell TikZJax exactly where to find the big engine files
        window.tikzjaxWasmPath = "./js/tex.wasm.gz";
        window.tikzjaxCorePath = "./js/core.dump.gz";
    </script>
    <script src="./js/output/tikzjax.js"></script>
</head>
<body>

    <h1>Vectors in 3D Space</h1>
    <p>The position vector is $\vec{r} = x\hat{i} + y\hat{j} + z\hat{k}$.</p>

    <script type="text/tikz">
        \usepackage{tikz-3dplot}
        \begin{tikzpicture}[tdplot_main_coords, scale=1.5]
            \draw[thick,->] (0,0,0) -- (2,0,0) node[anchor=north east]{$x$};
            \draw[thick,->] (0,0,0) -- (0,2,0) node[anchor=north west]{$y$};
            \draw[thick,->] (0,0,0) -- (0,0,2) node[anchor=south]{$z$};
            \draw[-stealth, red, ultra thick] (0,0,0) -- (1,1,1) node[anchor=west]{$\vec{r}$};
        \end{tikzpicture}
    </script>

</body>
</html>
